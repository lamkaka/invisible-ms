{{template "layout.html" .}}

{{define "title"}}Staff - IMS{{end}}

{{define "content"}}
<div class="staff-page" x-data="staff()" x-init="init()">
    <header class="page-header">
        <h1>Staff Management</h1>
        <button @click="showCreateModal = true" class="btn btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Staff
        </button>
    </header>

    <!-- Loading State -->
    <div class="loading-state" x-show="loading && !staffList.length">
        <div class="spinner"></div>
        <p>Loading staff...</p>
    </div>

    <!-- Error State -->
    <div class="error-state" x-show="error">
        <p>Error loading data: <span x-text="error"></span></p>
    </div>

    <!-- Staff Table -->
    <div class="table-container" x-show="staffList.length">
        <table class="data-table">
            <thead>
                <tr>
                    <th @click="sortBy('name')" class="sortable">
                        Name<span class="sort-indicator" x-text="sortIndicator('name')"></span>
                    </th>
                    <th @click="sortBy('phone_number')" class="sortable">
                        Phone<span class="sort-indicator" x-text="sortIndicator('phone_number')"></span>
                    </th>
                    <th>Roles</th>
                    <th @click="sortBy('is_active')" class="sortable">
                        Status<span class="sort-indicator" x-text="sortIndicator('is_active')"></span>
                    </th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="staffMember in staffList" :key="staffMember.staff_id">
                    <tr>
                        <td>
                            <div class="staff-info">
                                <div class="staff-avatar" x-text="getInitials(staffMember.name)"></div>
                                <span class="staff-name" x-text="staffMember.name"></span>
                            </div>
                        </td>
                        <td>
                            <span class="phone-number" x-text="staffMember.phone_number"></span>
                        </td>
                        <td>
                            <div class="roles-list">
                                <template x-for="role in staffMember.assigned_roles" :key="role">
                                    <span class="role-badge" x-text="role"></span>
                                </template>
                            </div>
                        </td>
                        <td>
                            <span class="status-badge" :class="staffMember.is_active ? 'status-active' : 'status-inactive'">
                                <span class="status-dot"></span>
                                <span x-text="staffMember.is_active ? 'Active' : 'Inactive'"></span>
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button @click="editStaff(staffMember)" class="btn btn-icon" title="Edit">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button @click="toggleStatus(staffMember)" class="btn btn-icon" :title="staffMember.is_active ? 'Deactivate' : 'Activate'">
                                    <svg x-show="staffMember.is_active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3,6 5,6 21,6"/>
                                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                        <line x1="10" y1="11" x2="10" y2="17"/>
                                        <line x1="14" y1="11" x2="14" y2="17"/>
                                    </svg>
                                    <svg x-show="!staffMember.is_active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="20,6 9,17 4,12"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div class="empty-state" x-show="!loading && !staffList.length">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <h3>No staff found</h3>
        <p>Get started by adding your first staff member</p>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" x-show="showCreateModal || showEditModal" x-transition.opacity>
        <div class="modal" @click.away="closeModal()">
            <div class="modal-header">
                <h2 x-text="showEditModal ? 'Edit Staff' : 'Add New Staff'"></h2>
                <button @click="closeModal()" class="modal-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form @submit.prevent="saveStaff()" class="modal-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" x-model="form.name" required placeholder="Enter staff name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" x-model="form.phone_number" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label for="roles">Roles</label>
                    <div class="roles-checkboxes">
                        <template x-for="role in availableRoles" :key="role">
                            <label class="checkbox-label">
                                <input type="checkbox" :value="role" x-model="form.assigned_roles">
                                <span x-text="role"></span>
                            </label>
                        </template>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" @click="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" :disabled="saving">
                        <span x-show="!saving">Save</span>
                        <span x-show="saving">Saving...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}

name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit test
        run: go test ./...

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: apps/api
    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
    env:
      GCP_SPANNER_PROJECT_ID: invisible-ms-local
      GCP_SPANNER_INSTANCE_ID: invisible-ms-instance
      GCP_SPANNER_DATABASE_ID: invisible-ms-db
      GCP_SPANNER_EMULATOR_HOST: localhost:9010
      WEBHOOK_SECRET: test-secret
      PORT: 8080
      TEMPLATES_PATH: ../web/templates
      STATIC_PATH: ../web/static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Run migrations
        run: go run ./cmd/migrate

      - name: Build and start server
        run: |
          go build -o /tmp/ims-server ./cmd/server
          /tmp/ims-server &
          echo $! > /tmp/server.pid
          for i in {1..30}; do
            if curl -sf "http://localhost:8080/api/companies" > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready" >&2
          exit 1

      - name: Run e2e tests
        run: go test ./e2e/...

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) || true

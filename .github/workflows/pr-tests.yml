name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run unit tests with JSON output and coverage
        run: go test -json -coverprofile=coverage.out $(go list ./... | grep -v /e2e) > unit-test.json

      - name: Generate unit test report
        if: always()
        run: |
          python3 -c '
          import json, os

          counts = {"pass": 0, "fail": 0, "skip": 0}
          with open("unit-test.json") as f:
              for line in f:
                  try:
                      evt = json.loads(line)
                      action = evt.get("Action")
                      if action in counts:
                          counts[action] += 1
                  except Exception:
                      pass
          total = sum(counts.values())
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("## Unit Test Results\n\n")
              f.write("- Passed: " + str(counts["pass"]) + "\n")
              f.write("- Failed: " + str(counts["fail"]) + "\n")
              f.write("- Skipped: " + str(counts["skip"]) + "\n")
              f.write("- Total: " + str(total) + "\n\n")
          '

      - name: Generate coverage report
        if: always()
        run: |
          echo "## Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: apps/api/coverage.out

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: apps/api
    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
    env:
      GCP_SPANNER_PROJECT_ID: invisible-ms-local
      GCP_SPANNER_INSTANCE_ID: invisible-ms-instance
      GCP_SPANNER_DATABASE_ID: invisible-ms-db
      GCP_SPANNER_EMULATOR_HOST: localhost:9010
      WEBHOOK_SECRET: test-secret
      PORT: 8080
      TEMPLATES_PATH: ../web/templates
      STATIC_PATH: ../web/static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Run migrations
        run: go run ./cmd/migrate

      - name: Build and start server
        run: |
          go build -o /tmp/ims-server ./cmd/server
          /tmp/ims-server &
          echo $! > /tmp/server.pid
          for i in {1..30}; do
            if curl -sf "http://localhost:8080/api/companies" > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready" >&2
          exit 1

      - name: Run e2e tests
        run: go test -json ./e2e/... > e2e-test.json

      - name: Generate e2e test report
        if: always()
        run: |
          python3 -c '
          import json, os

          counts = {"pass": 0, "fail": 0, "skip": 0}
          with open("e2e-test.json") as f:
              for line in f:
                  try:
                      evt = json.loads(line)
                      action = evt.get("Action")
                      if action in counts:
                          counts[action] += 1
                  except Exception:
                      pass
          total = sum(counts.values())
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("## E2E Test Results\n\n")
              f.write("- Passed: " + str(counts["pass"]) + "\n")
              f.write("- Failed: " + str(counts["fail"]) + "\n")
              f.write("- Skipped: " + str(counts["skip"]) + "\n")
              f.write("- Total: " + str(total) + "\n\n")
          '

      - name: Upload e2e test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-log
          path: apps/api/e2e-test.json

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) || true

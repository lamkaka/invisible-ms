<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}IMS - Hourly Staff Management{{end}}</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12,6 12,12 16,14"/>
                </svg>
                <span>IMS</span>
            </a>
            <ul class="nav-links">
                <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
                <li><a href="/staff" class="nav-link">Staff</a></li>
                <li><a href="/actions" class="nav-link">Actions</a></li>
            </ul>
            <div class="nav-company">
                <span class="company-badge">ACME Corp</span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {{block "content" .}}{{end}}
    </main>

    <footer class="footer">
        <p>IMS - Hourly Staff Management System</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>

{{template "layout.html" .}}

{{define "title"}}Workers - IMS{{end}}

{{define "content"}}
<div class="workers-page" x-data="workers()" x-init="init()">
    <header class="page-header">
        <h1>Worker Management</h1>
        <button @click="showCreateModal = true" class="btn btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Worker
        </button>
    </header>

    <!-- Loading State -->
    <div class="loading-state" x-show="loading && !workers.length">
        <div class="spinner"></div>
        <p>Loading workers...</p>
    </div>

    <!-- Error State -->
    <div class="error-state" x-show="error">
        <p>Error loading data: <span x-text="error"></span></p>
    </div>

    <!-- Workers Table -->
    <div class="table-container" x-show="workers.length">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="worker in workers" :key="worker.worker_id">
                    <tr>
                        <td>
                            <div class="worker-info">
                                <div class="worker-avatar" x-text="getInitials(worker.name)"></div>
                                <span class="worker-name" x-text="worker.name"></span>
                            </div>
                        </td>
                        <td>
                            <span class="phone-number" x-text="worker.phone_number"></span>
                        </td>
                        <td>
                            <div class="roles-list">
                                <template x-for="role in worker.assigned_roles" :key="role">
                                    <span class="role-badge" x-text="role"></span>
                                </template>
                            </div>
                        </td>
                        <td>
                            <span class="status-badge" :class="worker.is_active ? 'status-active' : 'status-inactive'">
                                <span class="status-dot"></span>
                                <span x-text="worker.is_active ? 'Active' : 'Inactive'"></span>
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button @click="editWorker(worker)" class="btn btn-icon" title="Edit">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button @click="toggleStatus(worker)" class="btn btn-icon" :title="worker.is_active ? 'Deactivate' : 'Activate'">
                                    <svg x-show="worker.is_active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                                    </svg>
                                    <svg x-show="!worker.is_active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="20,6 9,17 4,12"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div class="empty-state" x-show="!loading && !workers.length">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <h3>No workers found</h3>
        <p>Get started by adding your first worker</p>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" x-show="showCreateModal || showEditModal" x-transition.opacity>
        <div class="modal" @click.away="closeModal()">
            <div class="modal-header">
                <h2 x-text="showEditModal ? 'Edit Worker' : 'Add New Worker'"></h2>
                <button @click="closeModal()" class="modal-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form @submit.prevent="saveWorker()" class="modal-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" x-model="form.name" required placeholder="Enter worker name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" x-model="form.phone_number" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label for="roles">Roles</label>
                    <div class="roles-checkboxes">
                        <label class="checkbox-label">
                            <input type="checkbox" value="CLEANING" x-model="form.assigned_roles">
                            <span>CLEANING</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="DELIVERY" x-model="form.assigned_roles">
                            <span>DELIVERY</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="WAREHOUSE" x-model="form.assigned_roles">
                            <span>WAREHOUSE</span>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" @click="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" :disabled="saving">
                        <span x-show="!saving">Save</span>
                        <span x-show="saving">Saving...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
